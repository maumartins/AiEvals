<!DOCTYPE html>
<html lang="pt-BR" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}AI Response Quality Lab{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    .nav-link { @apply text-gray-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium; }
    .nav-active { @apply bg-gray-900 text-white px-3 py-2 rounded-md text-sm font-medium; }
    .btn-primary { @apply bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-4 rounded-lg transition-colors; }
    .btn-secondary { @apply bg-white hover:bg-gray-50 text-gray-700 font-semibold py-2 px-4 rounded-lg border border-gray-300 transition-colors; }
    .btn-danger { @apply bg-red-600 hover:bg-red-700 text-white font-semibold py-2 px-4 rounded-lg transition-colors; }
    .card { @apply bg-white rounded-xl shadow-sm border border-gray-200 p-6; }
    .badge { @apply inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium; }
    .badge-green { @apply badge bg-green-100 text-green-800; }
    .badge-yellow { @apply badge bg-yellow-100 text-yellow-800; }
    .badge-red { @apply badge bg-red-100 text-red-800; }
    .badge-gray { @apply badge bg-gray-100 text-gray-800; }
    .badge-blue { @apply badge bg-blue-100 text-blue-800; }
  </style>
</head>
<body class="h-full">
  <nav class="bg-gray-800 shadow-lg">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center">
          <div class="flex-shrink-0">
            <a href="/" class="text-white font-bold text-lg tracking-tight">
              🧪 AI Quality Lab
            </a>
          </div>
          <div class="ml-10 flex items-baseline space-x-2">
            <a href="/" class="nav-link">Dashboard</a>
            <a href="/datasets/" class="nav-link">Datasets</a>
            <a href="/runs/" class="nav-link">Experimentos</a>
            <a href="/runs/compare" class="nav-link">Comparar</a>
            <a href="/safety/" class="nav-link">Safety</a>
            <a href="/settings/" class="nav-link">Configurações</a>
          </div>
        </div>
        <div class="text-gray-400 text-xs">
          MVP v0.1.0
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    {% block content %}{% endblock %}
  </main>

  <footer class="mt-16 border-t border-gray-200 py-6">
    <div class="max-w-7xl mx-auto px-4 text-center text-gray-400 text-xs">
      AI Response Quality Lab — sistema analítico/assistivo — impacto do erro: baixo a médio —
      supervisão humana recomendada na interpretação dos resultados
    </div>
  </footer>
</body>
</html>
