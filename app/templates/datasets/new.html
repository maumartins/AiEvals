{% extends "base.html" %}
{% block title %}Novo Dataset{% endblock %}
{% block content %}
<div class="mb-6">
  <a href="/datasets/" class="text-indigo-600 hover:text-indigo-800 text-sm">← Voltar</a>
  <h1 class="text-3xl font-bold text-gray-900 mt-2">Novo Dataset</h1>
</div>

<div class="card max-w-xl">
  <form action="/datasets/" method="post" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Nome *</label>
      <input type="text" name="name" required class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Categoria</label>
      <input type="text" name="category" placeholder="ex: geral, rag, safety" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Descrição</label>
      <textarea name="description" rows="3" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"></textarea>
    </div>
    <button type="submit" class="btn-primary w-full">Criar Dataset</button>
  </form>
</div>
{% endblock %}
